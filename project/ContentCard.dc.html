<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<div style="border:1px solid rgba(63,82,64,0.15); border-radius:14px; padding:16px; background:#F7F9F2; box-shadow:0 1px 4px rgba(63,82,64,0.06);">
  <div style="display:block;">
    <div style="float:right; display:flex; flex-direction:column; align-items:flex-end; gap:8px; margin-left:12px; margin-bottom:4px;">
      <sc-if value="{{ showComplete }}" hint-placeholder-val="{{ false }}">
        <button onClick="{{ onCompleteClick }}" style="flex-shrink:0; white-space:nowrap; border:1px solid #9CB5B1; border-radius:8px; background:#F7F9F2; color:#9CB5B1; font-size:11px; font-weight:600; padding:6px 10px; cursor:pointer; font-family:inherit;" style-hover="background:#9CB5B1;color:#fff;">완료</button>
      </sc-if>
      <sc-if value="{{ isDone }}" hint-placeholder-val="{{ false }}">
        <button onClick="{{ onUncompleteClick }}" style="flex-shrink:0; white-space:nowrap; border:1px solid #9CB5B1; border-radius:8px; background:#F7F9F2; color:#9CB5B1; font-size:11px; font-weight:600; padding:6px 10px; cursor:{{ onUncompleteCursor }}; font-family:inherit;" style-hover="background:#9CB5B1;color:#fff;">미완료</button>
      </sc-if>
      <sc-if value="{{ hasImage }}" hint-placeholder-val="{{ false }}">
        <img src="{{ imageUrl }}" alt="" onClick="{{ onImageClick }}" style="width:52px; height:52px; object-fit:cover; border-radius:8px; border:1px solid rgba(63,82,64,0.15); cursor:pointer;" />
      </sc-if>
    </div>
    <div style="font-weight:700; font-size:16px; line-height:1.35; color:#3E4C52;">{{ title }}</div>
    <div style="clear:both;"></div>
  </div>

  <div style="display:flex; gap:6px; flex-wrap:wrap; margin-top:10px;">
    <div style="background:#C8DDBD; color:#3F5240; border-radius:20px; padding:3px 10px; font-size:11px; font-weight:600;">{{ categoryName }}</div>
    <sc-for list="{{ tagNames }}" as="tagName" hint-placeholder-count="2">
      <div style="background:rgba(156,181,177,0.25); color:#3F5240; border-radius:20px; padding:3px 10px; font-size:11px;">#{{ tagName }}</div>
    </sc-for>
  </div>

  <sc-if value="{{ hasSummary }}" hint-placeholder-val="{{ false }}">
    <div style="margin-top:10px; font-size:13px; line-height:1.5; color:#3F5240; opacity:0.75;">{{ summary }}</div>
  </sc-if>

  <sc-if value="{{ hasUrl }}" hint-placeholder-val="{{ false }}">
    <div style="display:flex; align-items:center; gap:12px; margin-top:12px;">
      <a href="{{ url }}" target="_blank" rel="noopener" style="font-size:12px; color:#E9A773; text-decoration:underline;">바로가기 ↗</a>
      <button onClick="{{ onCopyClick }}" title="링크 복사" style="width:24px; height:24px; border:none; background:transparent; border-radius:8px; cursor:pointer; padding:0; display:flex; align-items:center; justify-content:center;" style-hover="background:rgba(63,82,64,0.08);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3F5240" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="12" height="12" rx="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
      </button>
    </div>
  </sc-if>
</div>

<sc-if value="{{ imageModalOpen }}" hint-placeholder-val="{{ false }}">
  <div onClick="{{ closeImageModal }}" style="position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <img src="{{ imageUrl }}" alt="" onClick="{{ stopPropagation }}" style="max-width:90%; max-height:80%; object-fit:contain; border-radius:8px;" />
    <a href="{{ imageUrl }}" download target="_blank" rel="noopener noreferrer" onClick="{{ stopPropagation }}" style="margin-top:20px; background:#9CB5B1; color:#fff; padding:10px 20px; border-radius:8px; text-decoration:none; font-weight:600; font-size:14px;">다운로드</a>
  </div>
</sc-if>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 350, &quot;height&quot;: 150},
  &quot;title&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;콘텐츠 제목&quot;, &quot;tsType&quot;: &quot;string&quot;},
  &quot;summary&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot;},
  &quot;url&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot;},
  &quot;imageUrl&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot;},
  &quot;categoryName&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;글&quot;, &quot;tsType&quot;: &quot;string&quot;},
  &quot;tagNames&quot;: {&quot;editor&quot;: null, &quot;default&quot;: [], &quot;tsType&quot;: &quot;string[]&quot;},
  &quot;status&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;pending&quot;, &quot;done&quot;], &quot;default&quot;: &quot;pending&quot;, &quot;tsType&quot;: &quot;string&quot;},
  &quot;onComplete&quot;: {&quot;editor&quot;: null, &quot;default&quot;: null, &quot;tsType&quot;: &quot;(() =&gt; void) | null&quot;},
  &quot;onUncomplete&quot;: {&quot;editor&quot;: null, &quot;default&quot;: null, &quot;tsType&quot;: &quot;(() =&gt; void) | null&quot;}
}">
class Component extends DCLogic {
  state = {
    imageModalOpen: false
  };

  openImageModal = () => { this.setState({ imageModalOpen: true }); };
  closeImageModal = () => { this.setState({ imageModalOpen: false }); };
  stopPropagation = (e) => { e.stopPropagation(); };

  copy = () => {
    if (this.props.url) {
      navigator.clipboard.writeText(this.props.url);
    }
  };

  renderVals() {
    const tagNames = this.props.tagNames || [];
    return {
      title: this.props.title || '',
      summary: this.props.summary || '',
      url: this.props.url || '',
      imageUrl: this.props.imageUrl || '',
      hasImage: !!this.props.imageUrl,
      categoryName: this.props.categoryName || '기타',
      tagNames,
      hasSummary: !!this.props.summary,
      hasUrl: !!this.props.url,
      showComplete: this.props.status === 'pending' && !!this.props.onComplete,
      isDone: this.props.status === 'done',
      onCompleteClick: this.props.onComplete || (() => {}),
      onUncompleteClick: this.props.onUncomplete || (() => {}),
      onUncompleteCursor: this.props.onUncomplete ? 'pointer' : 'default',
      onCopyClick: this.copy,
      imageModalOpen: this.state.imageModalOpen,
      onImageClick: this.openImageModal,
      closeImageModal: this.closeImageModal,
      stopPropagation: this.stopPropagation,
    };
  }
}

</script>
</body>
</html>
