<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  coverRef = React.createRef();
  categoryRef = React.createRef();
  addRef = React.createRef();
  tagsRef = React.createRef();
  doneRef = React.createRef();
  settingsRef = React.createRef();
  searchPopoverRef = React.createRef();
  menuPopoverRef = React.createRef();

  clickTabInIframe(iframe, label) {
    try {
      const doc = iframe.contentDocument;
      if (!doc) return false;
      const all = doc.querySelectorAll('div');
      for (const n of all) {
        if (n.children.length === 0 && n.textContent.trim() === label) {
          const p = n.parentElement;
          if (p && p.children.length === 2 && p.children[0].style && p.children[0].style.borderRadius === '50%') {
            p.click();
            return true;
          }
        }
      }
    } catch (e) {}
    return false;
  }

  wireTabSnapshot(ref, label) {
    const iframe = ref.current;
    if (!iframe) return;
    const attempt = () => {
      if (!this.clickTabInIframe(iframe, label)) {
        setTimeout(attempt, 150);
      }
    };
    iframe.addEventListener('load', () => setTimeout(attempt, 150));
  }

  wireSettingsSnapshot(ref) {
    const iframe = ref.current;
    if (!iframe) return;
    const openMenuAttempt = () => {
      try {
        const doc = iframe.contentDocument;
        const menuBtn = doc && doc.querySelector('button[aria-label="메뉴"]');
        if (menuBtn) {
          menuBtn.click();
          setTimeout(clickSettingsAttempt, 150);
          return;
        }
      } catch (e) {}
      setTimeout(openMenuAttempt, 150);
    };
    const clickSettingsAttempt = () => {
      try {
        const doc = iframe.contentDocument;
        const all = doc.querySelectorAll('div');
        for (const n of all) {
          if (n.children.length === 0 && n.textContent.trim() === '설정') {
            n.click();
            return;
          }
        }
      } catch (e) {}
      setTimeout(clickSettingsAttempt, 150);
    };
    iframe.addEventListener('load', () => setTimeout(openMenuAttempt, 150));
  }

  wireButtonClickSnapshot(ref, ariaLabel) {
    const iframe = ref.current;
    if (!iframe) return;
    const attempt = () => {
      try {
        const doc = iframe.contentDocument;
        const btn = doc && doc.querySelector('button[aria-label="' + ariaLabel + '"]');
        if (btn) {
          btn.click();
          return;
        }
      } catch (e) {}
      setTimeout(attempt, 150);
    };
    iframe.addEventListener('load', () => setTimeout(attempt, 150));
  }

  componentDidMount() {
    setTimeout(() => {
      const el = this.coverRef.current;
      if (el) {
        el.style.transition = 'opacity 1s ease';
        el.style.opacity = '0';
        el.style.pointerEvents = 'none';
      }
    }, 2500);

    this.wireTabSnapshot(this.categoryRef, '카테고리');
    this.wireTabSnapshot(this.addRef, '추가');
    this.wireTabSnapshot(this.tagsRef, '태그');
    this.wireTabSnapshot(this.doneRef, '완료');
    this.wireSettingsSnapshot(this.settingsRef);
    this.wireButtonClickSnapshot(this.searchPopoverRef, '검색');
    this.wireButtonClickSnapshot(this.menuPopoverRef, '메뉴');
  }

  renderVals() {
    return {
      coverRef: this.coverRef,
      categoryRef: this.categoryRef,
      addRef: this.addRef,
      tagsRef: this.tagsRef,
      doneRef: this.doneRef,
      settingsRef: this.settingsRef,
      searchPopoverRef: this.searchPopoverRef,
      menuPopoverRef: this.menuPopoverRef,
    };
  }
}

</script>
